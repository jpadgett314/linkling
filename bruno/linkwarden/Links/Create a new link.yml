info:
  name: Create a new link
  type: http
  seq: 1

http:
  method: POST
  url: http://127.0.0.1:3000/linkwarden/api/v1/links
  body:
    type: json
    data: |-
      {
        "name": "string",
        "url": "https://exampleAAAAAAAAAAAAAAA.com",
        "type": "url",
        "description": "Some additional thoughts...",
        "tags": [
          {
            "id": 1,
            "name": "test"
          }
        ],
        "collection": {
          "id": 0,
          "name": "Unorganized"
        }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
